{% extends 'base.html' %}
{% block title %}Login — AutoAnalyst AI{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your AutoAnalyst account</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      {% if form.errors %}
      <p style="color:var(--error); font-size:0.85rem; margin-bottom:14px;">Invalid username or password.</p>
      {% endif %}
      <button type="submit" class="btn btn-primary btn-md" style="width:100%; margin-top:4px;">Sign In</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
    </div>
  </div>
</div>
{% endblock %}
