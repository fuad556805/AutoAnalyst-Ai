{% extends 'base.html' %}
{% block title %}Sign Up — AutoAnalyst AI{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Start analyzing data with AutoAnalyst AI</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label for="id_password1">Password</label>
        <input type="password" name="password1" id="id_password1" placeholder="Create password" required>
      </div>
      <div class="form-group">
        <label for="id_password2">Confirm Password</label>
        <input type="password" name="password2" id="id_password2" placeholder="Confirm password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-md" style="width:100%; margin-top:4px;">Create Account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
